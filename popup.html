<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>刷题鞭策酱</title>
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
  <div class="container">
    <div class="settings">
      <div class="input-group">
        <label for="wsUrl">🔗 连接地址:</label>
        <div class="input-with-button">
          <input type="text" id="wsUrl">
          <button id="saveSettings">💾 保存</button>
        </div>
      </div>
    </div>

    <div class="status" id="wsStatus">🌐 连接状态: 检查中...</div>
    <div class="status" id="deviceStatus">🔌 设备状态: 未连接</div>

    <!-- A通道 -->
    <div class="channel-control">
      <div class="channel-left">
        <h3>🌺 A通道</h3>

        <div class="channel-row">
          <label for="strengthA">💗 强度:</label>
          <input type="number" id="strengthA" min="0" max="200" value="20">
        </div>

        <div class="channel-row">
          <label for="softLimitA">⚡ 上限:</label>
          <input type="number" id="softLimitA" min="0" max="200" value="200" step="1">
        </div>
      </div>

      <div class="channel-right">
        <label for="waveA">📊 波形</label>
        <select id="waveA">
          <option value="1">💕 波形1</option>
          <option value="2">💓 波形2</option>
          <option value="3">💗 波形3</option>
        </select>
      </div>
    </div>

    <!-- B通道 -->
    <div class="channel-control">
      <div class="channel-left">
        <h3>🌺 B通道</h3>

        <div class="channel-row">
          <label for="strengthB">💗 强度:</label>
          <input type="number" id="strengthB" min="0" max="200" value="20">
        </div>

        <div class="channel-row">
          <label for="softLimitB">⚡ 上限:</label>
          <input type="number" id="softLimitB" min="0" max="200" value="200" step="1">
        </div>
      </div>

      <div class="channel-right">
        <label for="waveB">📊 波形</label>
        <select id="waveB">
          <option value="1">💕 波形1</option>
          <option value="2">💓 波形2</option>
          <option value="3">💗 波形3</option>
        </select>
      </div>
    </div>
  </div>

  <div id="qrcodeContainer">
    <div id="qrcode"></div>
  </div>

  <div class="button-group">
    <button id="reconnectBtn">🔄 重新连接</button>
    <button id="stopPulseBtn" class="red" disabled>⏹️ 断开连接</button>
  </div>

  <script src="js/qrcode.min.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
